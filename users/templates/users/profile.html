<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
</head>
<body>
    <h2>Update Profile</h2>
    
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{ user_form.as_p }}
        
        {{ profile_form.as_p }}
        
        <button type="submit">Save Changes</button>
    </form>
    <!-- logout -->
    <p><a href="{% url 'logout' %}">Logout</a></p>
</body>
</html>
