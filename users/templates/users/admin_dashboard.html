{% block admin_content %}

        <div class="p-6 bg-white rounded shadow text-center">
            <h2 class="text-xl text-gray-600">Total Doctors</h2>
            <p class="text-4xl font-bold mt-2">{{ total_doctors }}</p>
        </div>

        <div class="p-6 bg-white rounded shadow text-center">
            <h2 class="text-xl text-gray-600">Total Appointments</h2>
            <p class="text-4xl font-bold mt-2">{{ total_appointments }}</p>
        </div>
        <a href="{% url 'export_appointments_csv' %}">
            Export Appointments CSV
        </a>
