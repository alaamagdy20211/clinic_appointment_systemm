{% extends 'users/admin_base.html' %}

{% block admin_content %}
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Add Receptionist</h1>
        <a href="{% url 'admin_user_list' %}" class="bg-gray-600 text-white px-4 py-2 rounded">Back to Users</a>
    </div>

    <div class="bg-white shadow-md rounded-lg p-8 max-w-lg border-l-4 border-blue-500">
        <form method="post" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                        {{ field.label }}
                    </label>
                    <input
                        type="{{ field.field.widget.input_type }}"
                        name="{{ field.html_name }}"
                        id="{{ field.id_for_label }}"
                        value="{% if field.field.widget.input_type != 'password' %}{{ field.value|default:'' }}{% endif %}"
                        class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400 {% if field.errors %}border-red-400{% endif %}"
                    >
                    {% for error in field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}
            <div class="mt-6">
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition">
                    Create Receptionist
                </button>
            </div>
        </form>
    </div>
{% endblock %}
