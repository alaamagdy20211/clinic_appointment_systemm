{% extends 'users/admin_base.html' %}

{% block admin_content %}
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Add Doctor</h1>
        <a href="{% url 'admin_user_list' %}" class="bg-gray-600 text-white px-4 py-2 rounded">Back to Users</a>
    </div>

    <div class="bg-white shadow rounded p-6 max-w-lg">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <p class="text-red-500 text-sm mt-1">{{ field.errors|join:", " }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Create Doctor</button>
        </form>
    </div>
{% endblock %}
