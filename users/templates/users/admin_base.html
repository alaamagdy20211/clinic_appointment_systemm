<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex h-screen">

    <aside class="w-64 bg-gray-800 text-white flex flex-col">
        <div class="p-4 text-2xl font-bold border-b border-gray-700">Clinic Admin</div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'admin_dashboard' %}" class="block py-2 px-4 hover:bg-gray-700 rounded">Dashboard Home</a>
            <a href="{% url 'admin_user_list' %}" class="block py-2 px-4 hover:bg-gray-700 rounded">Manage Users</a>
            </nav>
        <div class="p-4 border-t border-gray-700">
            <a href="{% url 'logout' %}" class="block py-2 px-4 bg-red-600 hover:bg-red-700 rounded text-center">Logout</a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        {% if messages %}
            {% for message in messages %}
                <div class="p-4 mb-4 text-white bg-blue-500 rounded">{{ message }}</div>
            {% endfor %}
        {% endif %}

        {% block admin_content %}
        {% endblock %}
    </main>

</body>
</html>
