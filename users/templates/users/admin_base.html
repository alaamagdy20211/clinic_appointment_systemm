<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Clinic Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex h-screen">

    <!----- Sidebar -->
    <aside class="w-64 bg-blue-800 text-white flex flex-col flex-shrink-0">
        <div class="p-5 text-2xl font-bold border-b border-blue-700">Clinic Portal</div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="{% url 'admin_dashboard' %}"
               class="flex items-center gap-2 py-2 px-4 rounded hover:bg-blue-700 transition">
                Dashboard
            </a>
            <a href="{% url 'admin_user_list' %}"
               class="flex items-center gap-2 py-2 px-4 rounded hover:bg-blue-700 transition">
                Manage Users
            </a>
        </nav>
        <div class="p-4 border-t border-blue-700">
            <span class="block text-sm text-blue-300 mb-2">{{ user.username }}</span>
            <a href="{% url 'logout' %}"
               class="block py-2 px-4 bg-red-500 hover:bg-red-600 rounded text-center transition">
                Logout
            </a>
        </div>
    </aside>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white shadow px-8 py-4 flex items-center justify-between border-b">
            <span class="text-lg font-semibold text-gray-700">Admin Dashboard</span>
            <span class="text-sm text-gray-500">Welcome, {{ user.get_full_name|default:user.username }}</span>
        </header>

        <main class="flex-1 overflow-y-auto p-8">
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for message in messages %}
                        <div class="px-4 py-3 rounded border
                            {% if message.tags == 'success' %}bg-green-50 border-green-400 text-green-800
                            {% elif message.tags == 'error' %}bg-red-50 border-red-400 text-red-800
                            {% else %}bg-blue-50 border-blue-400 text-blue-800{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            {% block admin_content %}
            {% endblock %}
        </main>
    </div>

</body>
</html>
