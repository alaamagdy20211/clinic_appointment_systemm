{% extends 'users/admin_base.html' %}

{% block admin_content %}
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold">Manage Users</h1>
        <div>
            <a href="{% url 'create_doctor' %}" class="bg-green-600 text-white px-4 py-2 rounded">Add Doctor</a>
            <a href="{% url 'create_receptionist' %}" class="bg-blue-600 text-white px-4 py-2 rounded">Add Receptionist</a>
        </div>
    </div>

    <div class="bg-white shadow rounded overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-200 text-gray-700">
                    <th class="p-4 border-b">Username</th>
                    <th class="p-4 border-b">Email</th>
                    <th class="p-4 border-b">Role</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr class="hover:bg-gray-50">
                    <td class="p-4 border-b">{{ user.username }}</td>
                    <td class="p-4 border-b">{{ user.email }}</td>
                    <td class="p-4 border-b">
                        <span class="px-2 py-1 text-sm rounded font-medium
                            {% if user.role == 'DOCTOR' %}bg-green-100 text-green-800
                            {% elif user.role == 'PATIENT' %}bg-blue-100 text-blue-800
                            {% elif user.role == 'RECEPTIONIST' %}bg-purple-100 text-purple-800
                            {% elif user.role == 'ADMIN' %}bg-red-100 text-red-800
                            {% else %}bg-gray-100 text-gray-700{% endif %}">{{ user.get_role_display }}</span>

                            <form method="post" action="{% url 'delete_user' user.id %}" class="inline-block float-right">
                                {% csrf_token %}
                                <button type="submit" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded" onclick="return confirm('Are you sure you want to delete this user?');">Delete</button>

                            </form>
                    </td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="p-4 text-center text-gray-500">No users found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
