<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Appointment Booked</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <nav class="bg-blue-600 text-white p-4 flex justify-between items-center shadow">
        <div class="text-xl font-bold">Clinic Portal</div>
        <div class="space-x-4 flex items-center">
            <a href="{% url 'patient_dashboard' %}" class="hover:underline">Dashboard</a>
            <a href="{% url 'logout' %}" class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded">Logout</a>
        </div>
    </nav>

    <main class="flex items-center justify-center min-h-[80vh] p-6">
        <div class="bg-white rounded-lg shadow-md border-l-4 border-green-500 p-10 max-w-md w-full text-center">

            <!----- Checkmark icon -->
            <div class="flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mx-auto mb-6">
                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" stroke-width="2.5"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                </svg>
            </div>

            <h1 class="text-2xl font-bold text-gray-800 mb-2">Appointment Booked!</h1>
            <p class="text-gray-500 mb-8">Your appointment has been successfully scheduled. We'll see you soon.</p>

            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'patient_dashboard' %}"
                
                   class="bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded transition text-sm">
                    Back to Dashboard
                </a>
                
                <a href="{% url 'appointment_list' %}"
                   class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold px-6 py-2 rounded transition text-sm">
                    View My Appointments
                </a>
            </div>
        </div>
    </main>

</body>
</html>
