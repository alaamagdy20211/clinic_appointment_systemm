name: Django CI

on:
  push:
    branches:
      - "**"

  pull_request:

jobs:

  test:

    runs-on: ubuntu-latest

    services:

      postgres:
        image: postgres:17

        env:
          POSTGRES_DB: clinic_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: alaa123@

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: clinic_db
      DB_USER: postgres
      DB_PASSWORD: alaa123@

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Check migrations
        run: |
          python manage.py makemigrations --check

      - name: Run tests
        run: |
          python manage.py test

      - name: Build Docker Image
        run: |
          docker build -t clinic:test .
