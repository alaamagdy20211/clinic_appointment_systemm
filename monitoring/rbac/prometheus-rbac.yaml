apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus

rules:
  - apiGroups: [""]  #The empty string means the Core API.
    resources:
      - nodes
      - services
      - endpoints
      - pods
      - namespaces
    verbs:
      - get
      - list
      - watch



---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus

subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus